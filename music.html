        .nav-icons { display: flex; gap: 25px; color: #1d1d1f; font-size: 18px; }
        .nav-icons i { cursor: pointer; transition: opacity 0.2s; }
        .nav-icons i:hover { opacity: 0.5; }

        .nav-overlay {
            position: fixed; top: 54px; left: 0; width: 100%; height: calc(100vh - 54px);
            background: #ffffff; z-index: 9998; padding: 30px 25px;
            transform: translateY(-100%); opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .nav-overlay.active { transform: translateY(0); opacity: 1; visibility: visible; }

        .menu-list { list-style: none; }
        .menu-list li { border-bottom: 1px solid #e5e5ea; }
        .menu-list a { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; font-size: 24px; font-weight: 600; color: #1d1d1f; text-decoration: none; transition: color 0.3s; 
        }
        .menu-list a:hover, .menu-list a.active { color: #fa233b; }
        .menu-list a i { font-size: 18px; color: #86868b; }

        .submenu-header {
            display: flex; align-items: center; font-size: 24px; font-weight: 600; color: #1d1d1f;
            padding-bottom: 15px; margin-bottom: 10px; border-bottom: 1px solid #e5e5ea; cursor: pointer;
        }
        .submenu-header i { margin-right: 15px; color: #fa233b; font-size: 22px; }

        .search-box { display: flex; align-items: center; background: #f5f5f7; border-radius: 12px; padding: 12px 15px; }
        .search-box i { color: #86868b; font-size: 20px; margin-right: 12px; }
        .search-box input { border: none; background: transparent; outline: none; font-size: 20px; width: 100%; color: #1d1d1f; }
        .search-box input::placeholder { color: #86868b; }

           APPLE MUSIC PLAYER UI
           ========================================= */
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        .am-player-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        /* MEDIA SECTION (TEMPAT KOVER DAN LIRIK BERGANTIAN) */
        .media-section {
            position: relative;
            width: 100%;
            height: 300px; 
            margin-bottom: 30px;
        }

        /* KOVER ALBUM */
        .cover-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
        }

        .cover-view img {
            width: 100%;
            height: auto; 
            border-radius: 12px;
            transform: scale(0.85); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .am-player-container.playing .cover-view img {
            transform: scale(1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        /* TAMPILAN LIRIK BERJALAN */
        .lyrics-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto;
            padding: 10px 10px 80px 0;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            scroll-behavior: smooth;
            opacity: 0; transform: translateY(20px); pointer-events: none; z-index: 1;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .lyrics-view::-webkit-scrollbar { display: none; }

        .lyric-line {
            font-size: 16px; font-weight: 700; color: rgba(0, 0, 0, 0.3);
            margin-bottom: 18px; line-height: 1.5; transition: all 0.4s ease;
            transform-origin: left center; cursor: pointer;

        .am-player-container.lyric-mode .lyrics-view { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .am-song-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 5px; }
        .am-text-info { display: flex; flex-direction: column; overflow: hidden; padding-right: 15px; }
        .am-title { font-size: 22px; font-weight: 800; color: #1d1d1f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .am-artist { font-size: 16px; font-weight: 500; color: #fa233b; }

        .am-progress { margin-bottom: 30px; padding: 0 5px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; outline: none; cursor: pointer; overflow: hidden; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 0px; box-shadow: -400px 0 0 400px #a4a4a4; transition: all 0.2s; }
        .am-time { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #86868b; margin-top: 8px; }

        /* KONTROL PUTAR (PLAY, NEXT, PREV) */
        .am-controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 30px; }

        .am-btn-side { font-size: 32px; }
        .am-btn-play { font-size: 50px; }

    let currentSongIndex = 0;
    let isPlaying = false;
    let currentLyricsData = []; 

    const playerNode = document.getElementById("playerNode");
    const audio = document.getElementById("myAudio");
    const albumCover = document.getElementById("albumCover");
    const songTitleText = document.getElementById("songTitle");
    const artistNameText = document.getElementById("artistName");
    const songDescText = document.getElementById("songDescription");
    
    const progressBar = document.getElementById("progressBar");
    const volumeBar = document.getElementById("volumeBar");
    const currentTimeText = document.getElementById("currentTime");
    const durationTimeText = document.getElementById("durationTime");
    
    const playBtn = document.getElementById("playBtn");
    const playIcon = document.getElementById("playIcon");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    
    const lyricView = document.getElementById("lyricView");
    const toggleLyricsBtn = document.getElementById("toggleLyricsBtn");

    // FUNGSI LIRIK
    toggleLyricsBtn.addEventListener("click", () => {
        playerNode.classList.toggle("lyric-mode");
        if(playerNode.classList.contains("lyric-mode")) {
            syncLyrics(true); 
        }
    });

    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const result = [];
        lines.forEach(line => {
            const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
            if (match) {
                const min = parseInt(match[1]);
                const sec = parseInt(match[2]);
                const ms = parseInt(match[3]);
                const time = min * 60 + sec + ms / (match[3].length === 2 ? 100 : 1000);
                const text = match[4].trim();
                if(text) result.push({ time, text });
            }
        });
        return result;
    }

    function renderLyrics(lrcText) {
        lyricView.innerHTML = ''; 
        if (lrcText && lrcText.trim() !== "") {
            currentLyricsData = parseLRC(lrcText);
            if (currentLyricsData.length > 0) {
                currentLyricsData.forEach((line) => {
                    const span = document.createElement('div');
                    span.className = 'lyric-line';
                    span.innerText = line.text;
                    span.addEventListener('click', () => {
                        audio.currentTime = line.time;
                        if (!isPlaying) togglePlay();
                    });
                    lyricView.appendChild(span);
                });
                const spacer = document.createElement('div');
                spacer.style.height = "200px";
                lyricView.appendChild(spacer);
            } else {
                lyricView.innerHTML = `<div class="lyric-line" style="text-align:center;">Lirik belum sinkron</div>`;
            }
        } else {
            currentLyricsData = [];
            lyricView.innerHTML = `<div class="lyric-line" style="text-align:center;">Belum Tersedia Lirik</div>`;
        }
    }

    function syncLyrics(forceScroll = false) {
        if (currentLyricsData.length === 0 || !playerNode.classList.contains("lyric-mode")) return;
        const currentTime = audio.currentTime;
        let activeIndex = -1;

        for (let i = 0; i < currentLyricsData.length; i++) {
            if (currentTime >= currentLyricsData[i].time) {
                activeIndex = i;
            } else { break; }
        }

        if (activeIndex !== -1) {
            const lyricElements = lyricView.querySelectorAll('.lyric-line');
            lyricElements.forEach((el, index) => {
                if (index === activeIndex) {
                    if (!el.classList.contains('active') || forceScroll) {
                        el.classList.add('active');
                        const containerCenter = lyricView.clientHeight / 2;
                        const elOffset = el.offsetTop;
                        const elHeight = el.clientHeight;
                        lyricView.scrollTo({
                            top: elOffset - containerCenter + (elHeight / 2),
                            behavior: 'smooth'
                        });
                    }
                } else {
                    el.classList.remove('active');
                }
            });
        }
    }

    // FUNGSI UTAMA PEMUTAR
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function loadSong(index) {
        const song = playlist[index];
        songTitleText.innerText = song.title;
        artistNameText.innerText = song.artist;
        albumCover.src = song.cover;
        audio.src = song.src;
        songDescText.innerText = song.description;
        
        renderLyrics(song.lyrics); 
        
        progressBar.value = 0;
        currentTimeText.innerText = "0:00";
        durationTimeText.innerText = "-0:00";
        
        if (isPlaying) { audio.play(); }
    }

    loadSong(currentSongIndex);

    function togglePlay() {
        if (audio.paused) {
            audio.play(); 
            playIcon.classList.replace("fa-play", "fa-pause");
            playerNode.classList.add("playing"); 
            isPlaying = true;
        } else {
            audio.pause(); 
            playIcon.classList.replace("fa-pause", "fa-play");
            playerNode.classList.remove("playing"); 
            isPlaying = false;
        }
    }

    playBtn.addEventListener("click", togglePlay);

    nextBtn.addEventListener("click", function() {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        loadSong(currentSongIndex);
    });

    prevBtn.addEventListener("click", function() {
        currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
        loadSong(currentSongIndex);
    });

    audio.addEventListener("timeupdate", function() {
        const currentTime = audio.currentTime;
        const duration = audio.duration;
        
        if (duration) {
            progressBar.max = duration;
            progressBar.value = currentTime;
            currentTimeText.innerText = formatTime(currentTime);
            const timeLeft = duration - currentTime;
            durationTimeText.innerText = "-" + formatTime(timeLeft);
        }
        syncLyrics(); 
    });

    progressBar.addEventListener("input", function() {
        audio.currentTime = progressBar.value;
        syncLyrics(true); 
    });

    volumeBar.addEventListener("input", function() {
        audio.volume = volumeBar.value / 100;
    });

    audio.addEventListener("ended", function() {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        loadSong(currentSongIndex);
    });
</script>
