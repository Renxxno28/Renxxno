        let currentSongIndex = 0; let isPlaying = false; let currentLyricsData = []; 
    const playerNode = document.getElementById("playerNode"); const audio = document.getElementById("myAudio");
    const albumCover = document.getElementById("albumCover"); const songTitleText = document.getElementById("songTitle");
    const artistNameText = document.getElementById("artistName"); const songDescText = document.getElementById("songDescription");
    const progressBar = document.getElementById("progressBar"); const volumeBar = document.getElementById("volumeBar");
    const currentTimeText = document.getElementById("currentTime"); const durationTimeText = document.getElementById("durationTime");
    const playBtn = document.getElementById("playBtn"); const playIcon = document.getElementById("playIcon");
    const prevBtn = document.getElementById("prevBtn"); const nextBtn = document.getElementById("nextBtn");
    const lyricView = document.getElementById("lyricView"); const toggleLyricsBtn = document.getElementById("toggleLyricsBtn");

    toggleLyricsBtn.addEventListener("click", () => { playerNode.classList.toggle("lyric-mode"); if(playerNode.classList.contains("lyric-mode")) syncLyrics(true); });

    function parseLRC(lrcText) {
        const lines = lrcText.split('\n'); const result = [];
        lines.forEach(line => {
            const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
            if (match) {
                const min = parseInt(match[1]); const sec = parseInt(match[2]); const ms = parseInt(match[3]);
                const time = min * 60 + sec + ms / (match[3].length === 2 ? 100 : 1000);
                const text = match[4].trim(); if(text) result.push({ time, text });
            }
        }); return result;
    }

    function renderLyrics(lrcText) {
        lyricView.innerHTML = ''; 
        if (lrcText && lrcText.trim() !== "") {
            currentLyricsData = parseLRC(lrcText);
            if (currentLyricsData.length > 0) {
                currentLyricsData.forEach((line) => {
                    const span = document.createElement('div'); span.className = 'lyric-line'; span.innerText = line.text;
                    span.addEventListener('click', () => { audio.currentTime = line.time; if (!isPlaying) togglePlay(); });
                    lyricView.appendChild(span);
                });
                const spacer = document.createElement('div'); spacer.style.height = "200px"; lyricView.appendChild(spacer);
            }
        }
    }

    function syncLyrics(forceScroll = false) {
        if (currentLyricsData.length === 0 || !playerNode.classList.contains("lyric-mode")) return;
        const currentTime = audio.currentTime; let activeIndex = -1;
        for (let i = 0; i < currentLyricsData.length; i++) { if (currentTime >= currentLyricsData[i].time) activeIndex = i; else break; }
        if (activeIndex !== -1) {
            const lyricElements = lyricView.querySelectorAll('.lyric-line');
            lyricElements.forEach((el, index) => {
                if (index === activeIndex) {
                    if (!el.classList.contains('active') || forceScroll) {
                        el.classList.add('active');
                        const containerCenter = lyricView.clientHeight / 2;
                        lyricView.scrollTo({ top: el.offsetTop - containerCenter + (el.clientHeight / 2), behavior: 'smooth' });
                    }
                } else { el.classList.remove('active'); }
            });
        }
    }

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return "0:00";
        const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function loadSong(index) {
        const song = playlist[index];
        songTitleText.innerText = song.title; artistNameText.innerText = song.artist; albumCover.src = song.cover;
        audio.src = song.src; songDescText.innerText = song.description;
        renderLyrics(song.lyrics); 
        progressBar.value = 0; currentTimeText.innerText = "0:00"; durationTimeText.innerText = "-0:00";
        if (isPlaying) audio.play(); 
    }

    loadSong(currentSongIndex);

    function togglePlay() {
        if (audio.paused) { audio.play(); playIcon.classList.replace("fa-play", "fa-pause"); playerNode.classList.add("playing"); isPlaying = true; }
        else { audio.pause(); playIcon.classList.replace("fa-pause", "fa-play"); playerNode.classList.remove("playing"); isPlaying = false; }
    }

    playBtn.addEventListener("click", togglePlay);
    nextBtn.addEventListener("click", function() { currentSongIndex = (currentSongIndex + 1) % playlist.length; loadSong(currentSongIndex); });
    prevBtn.addEventListener("click", function() { currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length; loadSong(currentSongIndex); });

    audio.addEventListener("timeupdate", function() {
        if (audio.duration) {
            progressBar.max = audio.duration; progressBar.value = audio.currentTime;
            currentTimeText.innerText = formatTime(audio.currentTime);
            durationTimeText.innerText = "-" + formatTime(audio.duration - audio.currentTime);
        }
        syncLyrics(); 
    });

    progressBar.addEventListener("input", function() { audio.currentTime = progressBar.value; syncLyrics(true); });
    volumeBar.addEventListener("input", function() { audio.volume = volumeBar.value / 100; });
    audio.addEventListener("ended", function() { currentSongIndex = (currentSongIndex + 1) % playlist.length; loadSong(currentSongIndex); });
</script>
