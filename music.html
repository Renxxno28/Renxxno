            color: #1c1c1e; 
        }

            100% { opacity: 1; transform: scale(1) translateY(0); }

        .am-player-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 32px;

            width: 100%;
            max-width: 360px; /* Sedikit dirampingkan agar proporsi kover 1:1 lebih pas */

            border: 2px solid #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;

            animation: popIn 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;

        .am-player-card.changing-track .main-content-wrapper,

            align-items: center;
            gap: 15px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .am-player-card.lyric-mode .lyrics-header {
            max-height: 80px; 
            opacity: 1;
            margin-bottom: 15px;
        }

        .mini-cover {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);

            flex: 1;
            overflow: hidden;
        }

            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #1e272e;
        }

            font-size: 12px;
            color: #6c5ce7;
            font-weight: 600;
        }

            position: relative;
            width: 100%;
            height: 330px; /* Diperpendek dari 380px agar presisi dengan ukuran konten */
            margin-bottom: 5px;
            transition: all 0.3s ease; 
        }

            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);

        const lines = lrcText.split('\n');
        const result = [];
        lines.forEach(line => {
            const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
            if (match) {
                const min = parseInt(match[1]);
                const sec = parseInt(match[2]);
                const ms = parseInt(match[3]);
                const time = min * 60 + sec + ms / (match[3].length === 2 ? 100 : 1000);
                const text = match[4].trim();
                if(text) result.push({ time, text });
            }
        });
        return result;
    }

    function renderLyrics(lrcText) {
        lyricView.innerHTML = ''; 
        if (lrcText && lrcText.trim() !== "") {
            currentLyricsData = parseLRC(lrcText);
            if (currentLyricsData.length > 0) {
                currentLyricsData.forEach((line, i) => {
                    const span = document.createElement('div');
                    span.className = 'lyric-line';
                    span.innerText = line.text;
                    span.addEventListener('click', () => {
                        audio.currentTime = line.time;
                        if (!isPlaying) togglePlay();
                    });
                    lyricView.appendChild(span);
                });
                const spacer = document.createElement('div');
                spacer.style.height = "200px";
                lyricView.appendChild(spacer);
            } else {
                lyricView.innerHTML = `<div class="lyric-line" style="text-align:center;">Lirik belum sinkron</div>`;
            }
        } else {
            currentLyricsData = [];
            lyricView.innerHTML = `<div class="lyric-line" style="text-align:center;">Belum Tersedia Lirik</div>`;
        }
    }

    function syncLyrics(forceScroll = false) {
        if (currentLyricsData.length === 0 || !playerNode.classList.contains("lyric-mode")) return;

        const currentTime = audio.currentTime;
        let activeIndex = -1;

        for (let i = 0; i < currentLyricsData.length; i++) {
            if (currentTime >= currentLyricsData[i].time) {
                activeIndex = i;
            } else {
                break;
            }
        }

        if (activeIndex !== -1) {
            const lyricElements = lyricView.querySelectorAll('.lyric-line');
            lyricElements.forEach((el, index) => {
                if (index === activeIndex) {
                    if (!el.classList.contains('active') || forceScroll) {
                        el.classList.add('active');
                        const containerCenter = lyricView.clientHeight / 2;
                        const elOffset = el.offsetTop;
                        const elHeight = el.clientHeight;
                        lyricView.scrollTo({
                            top: elOffset - containerCenter + (elHeight / 2),
                            behavior: 'smooth'
                        });
                    }
                } else {
                    el.classList.remove('active');
                }
            });
        }
    }

    function loadSong(index) {
        if (isChangingTrack) return;
        isChangingTrack = true;
        const song = playlist[index];
        
        playerNode.classList.add("changing-track");
        
        setTimeout(() => {
            songTitleText.innerText = song.title;
            artistNameText.innerText = song.artist;
            albumCover.src = song.cover;
            
            miniTitle.innerText = song.title;
            miniArtist.innerText = song.artist;
            miniCover.src = song.cover;
            
            audio.src = song.src;
            songDescText.innerText = song.description;
            
            renderLyrics(song.lyrics);
            
            progressBar.value = 0;
            currentTimeText.innerText = "0:00";
            
            playerNode.classList.remove("changing-track");
            
            if (isPlaying) {
                audio.play();
            }
            
            setTimeout(() => { isChangingTrack = false; }, 400);
        }, 300);
    }

    const firstSong = playlist[currentSongIndex];
    songTitleText.innerText = firstSong.title;
    artistNameText.innerText = firstSong.artist;
    albumCover.src = firstSong.cover;
    
    miniTitle.innerText = firstSong.title;
    miniArtist.innerText = firstSong.artist;
    miniCover.src = firstSong.cover;
    
    audio.src = firstSong.src;
    songDescText.innerText = firstSong.description;
    renderLyrics(firstSong.lyrics);

    function togglePlay() {
        if (audio.paused) {
            audio.play(); 
            playIcon.classList.replace("fa-circle-play", "fa-circle-pause");
            albumCover.classList.add("playing"); 
            isPlaying = true;
        } else {
            audio.pause(); 
            playIcon.classList.replace("fa-circle-pause", "fa-circle-play");
            albumCover.classList.remove("playing"); 
            isPlaying = false;
        }
    }

    playBtn.addEventListener("click", togglePlay);

    nextBtn.addEventListener("click", function() {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        loadSong(currentSongIndex);
    });

    prevBtn.addEventListener("click", function() {
        currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
        loadSong(currentSongIndex);
    });

    audio.addEventListener("timeupdate", function() {
        const currentTime = audio.currentTime;
        const duration = audio.duration;
        
        if (duration) {
            progressBar.max = duration;
            progressBar.value = currentTime;
            currentTimeText.innerText = formatTime(currentTime);
            durationTimeText.innerText = formatTime(duration);
        }
        syncLyrics();
    });

    progressBar.addEventListener("input", function() {
        audio.currentTime = progressBar.value;
        syncLyrics(true); 
    });

    audio.addEventListener("ended", function() {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        loadSong(currentSongIndex);
    });
</script>
</body>
</html>
