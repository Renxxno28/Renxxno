<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music | Renxxno</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff; /* Background putih bersih ala Apple */
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            padding: 80px 20px 40px 20px; /* Jarak untuk Navbar */
            color: #1d1d1f; 
        }

        /* =========================================
           TOP NAVBAR APPLE STYLE (WAJIB)
           ========================================= */
        .apple-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 54px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 9999; border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .nav-brand { font-size: 20px; font-weight: 600; color: #1d1d1f; text-decoration: none; letter-spacing: -0.5px; }
        .nav-icons { display: flex; gap: 25px; color: #1d1d1f; font-size: 18px; }
        .nav-icons i { cursor: pointer; transition: opacity 0.2s; }
        .nav-icons i:hover { opacity: 0.5; }

        .nav-overlay {
            position: fixed; top: 54px; left: 0; width: 100%; height: calc(100vh - 54px);
            background: #ffffff; z-index: 9998; padding: 30px 25px;
            transform: translateY(-100%); opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .nav-overlay.active { transform: translateY(0); opacity: 1; visibility: visible; }

        .menu-list { list-style: none; }
        .menu-list li { border-bottom: 1px solid #e5e5ea; }
        .menu-list a { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; font-size: 24px; font-weight: 600; color: #1d1d1f; text-decoration: none; transition: color 0.3s; 
        }
        .menu-list a:hover, .menu-list a.active { color: #fa233b; /* Warna aksen merah Apple Music */ }
        .menu-list a i { font-size: 18px; color: #86868b; }

        .submenu-header {
            display: flex; align-items: center; font-size: 24px; font-weight: 600; color: #1d1d1f;
            padding-bottom: 15px; margin-bottom: 10px; border-bottom: 1px solid #e5e5ea; cursor: pointer;
        }
        .submenu-header i { margin-right: 15px; color: #fa233b; font-size: 22px; }

        .search-box { display: flex; align-items: center; background: #f5f5f7; border-radius: 12px; padding: 12px 15px; }
        .search-box i { color: #86868b; font-size: 20px; margin-right: 12px; }
        .search-box input { border: none; background: transparent; outline: none; font-size: 20px; width: 100%; color: #1d1d1f; }
        .search-box input::placeholder { color: #86868b; }

        /* =========================================
           APPLE MUSIC PLAYER UI
           ========================================= */
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        .am-player-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        /* KOVER ALBUM (EFEK ZOOM ALA APPLE) */
        .am-album-art {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .am-album-art img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            /* Saat dijeda, kover mengecil sedikit (scale 0.8) */
            transform: scale(0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Saat diputar, kover kembali besar (scale 1) */
        .am-player-container.playing .am-album-art img {
            transform: scale(1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            border-radius: 8px; /* Mengikuti gaya iOS */
        }

        /* INFO LAGU */
        .am-song-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 5px;
        }

        .am-text-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-right: 15px;
        }

        .am-title {
            font-size: 22px;
            font-weight: 800;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .am-artist {
            font-size: 16px;
            font-weight: 500;
            color: #fa233b; /* Merah Apple Music */
        }

        .am-more-btn {
            font-size: 22px;
            color: #1d1d1f;
            background: rgba(0,0,0,0.05);
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        /* PROGRESS BAR */
        .am-progress {
            margin-bottom: 35px;
            padding: 0 5px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            overflow: hidden;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 0px; 
            box-shadow: -400px 0 0 400px #a4a4a4; /* Warna abu-abu scrub */
            transition: all 0.2s;
        }

        .am-time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: #86868b;
            margin-top: 8px;
        }

        /* KONTROL PUTAR */
        .am-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 45px;
            margin-bottom: 35px;
        }

        .am-btn {
            background: transparent;
            border: none;
            color: #1d1d1f;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .am-btn:active { transform: scale(0.85); opacity: 0.7; }
        .am-btn-side { font-size: 35px; }
        .am-btn-play { font-size: 55px; }

        /* VOLUME BAR */
        .am-volume {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
            color: #86868b;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .am-volume input[type="range"]::-webkit-slider-thumb { box-shadow: -400px 0 0 400px #1d1d1f; }

        /* DESKRIPSI (GAYA APPLE PLAYING NEXT / INFO) */
        .am-description-box {
            background: #f5f5f7;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s forwards;
        }

        .desc-header {
            font-size: 16px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .desc-header i { color: #fa233b; }

        .desc-body {
            font-size: 14px;
            color: #576574;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<nav class="apple-nav">
    <a href="index.html" class="nav-brand">Renxxno</a>
    <div class="nav-icons">
        <i class="fa-solid fa-magnifying-glass" id="toggleSearch"></i>
        <i class="fa-solid fa-bars" id="toggleMenu"></i>
    </div>
</nav>

<div class="nav-overlay" id="menuOverlay">
    
    <div id="mainMenu">
        <ul class="menu-list">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="biodata.html">Biodata</a></li>
            <li><a href="#" id="btnGamesMenu">Games <i class="fa-solid fa-chevron-right"></i></a></li>
            <li><a href="music.html" class="active">Music</a></li>
        </ul>
    </div>

    <div id="subMenuGames" style="display: none;">
        <div class="submenu-header" id="btnBackMainMenu">
            <i class="fa-solid fa-chevron-left"></i>
            <span>Games</span>
        </div>
        <ul class="menu-list">
            <li><a href="games.html">My Account</a></li>
            <li><a href="ghosthunter.html">Ghost Hunter Mini</a></li>
        </ul>
    </div>

</div>

<div class="nav-overlay" id="searchOverlay">
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Cari..." id="searchInput">
    </div>
</div>
    <div class="am-player-container" id="playerNode">
    
    <div class="am-album-art">
        <img id="albumCover" src="" alt="Album Cover">
    </div>

    <div class="am-song-info">
        <div class="am-text-info">
            <div class="am-title" id="songTitle">Memuat...</div>
            <div class="am-artist" id="artistName">🎵</div>
        </div>
        <div class="am-more-btn"><i class="fa-solid fa-ellipsis"></i></div>
    </div>

    <div class="am-progress">
        <input type="range" id="progressBar" value="0" step="1" min="0" max="100">
        <div class="am-time">
            <span id="currentTime">0:00</span>
            <span id="durationTime">-0:00</span> </div>
    </div>

    <div class="am-controls">
        <button class="am-btn am-btn-side" id="prevBtn"><i class="fa-solid fa-backward-fill"></i></button>
        <button class="am-btn am-btn-play" id="playBtn"><i class="fa-solid fa-play" id="playIcon"></i></button>
        <button class="am-btn am-btn-side" id="nextBtn"><i class="fa-solid fa-forward-fill"></i></button>
    </div>

    <div class="am-volume">
        <i class="fa-solid fa-volume-off"></i>
        <input type="range" id="volumeBar" value="100" min="0" max="100">
        <i class="fa-solid fa-volume-high"></i>
    </div>

    <audio id="myAudio"></audio>
</div>

<div class="am-description-box">
    <div class="desc-header">
        <i class="fa-solid fa-circle-info"></i> Tentang Lagu
    </div>
    <div class="desc-body" id="songDescription">
        Memuat deskripsi lagu...
    </div>
</div>

<script>
    // ==========================================
    // 1. SCRIPT NAVBAR & NESTED MENU APPLE
    // ==========================================
    const btnMenu = document.getElementById('toggleMenu');
    const btnSearch = document.getElementById('toggleSearch');
    const menuOverlay = document.getElementById('menuOverlay');
    const searchOverlay = document.getElementById('searchOverlay');
    const mainMenu = document.getElementById('mainMenu');
    const subMenuGames = document.getElementById('subMenuGames');
    const btnGamesMenu = document.getElementById('btnGamesMenu');
    const btnBackMainMenu = document.getElementById('btnBackMainMenu');

    btnMenu.addEventListener('click', () => {
        if (searchOverlay.classList.contains('active')) {
            searchOverlay.classList.remove('active');
            btnSearch.classList.replace('fa-xmark', 'fa-magnifying-glass');
        }
        menuOverlay.classList.toggle('active');
        if (menuOverlay.classList.contains('active')) {
            btnMenu.classList.replace('fa-bars', 'fa-xmark');
            mainMenu.style.display = 'block';
            subMenuGames.style.display = 'none';
        } else {
            btnMenu.classList.replace('fa-xmark', 'fa-bars');
        }
    });

    btnSearch.addEventListener('click', () => {
        if (menuOverlay.classList.contains('active')) {
            menuOverlay.classList.remove('active');
            btnMenu.classList.replace('fa-xmark', 'fa-bars');
        }
        searchOverlay.classList.toggle('active');
        if (searchOverlay.classList.contains('active')) {
            btnSearch.classList.replace('fa-magnifying-glass', 'fa-xmark');
            document.getElementById('searchInput').focus();
        } else {
            btnSearch.classList.replace('fa-xmark', 'fa-magnifying-glass');
        }
    });

    btnGamesMenu.addEventListener('click', (e) => {
        e.preventDefault();
        mainMenu.style.display = 'none';
        subMenuGames.style.display = 'block';
    });

    btnBackMainMenu.addEventListener('click', () => {
        subMenuGames.style.display = 'none';
        mainMenu.style.display = 'block';
    });

    // ==========================================
    // 2. SCRIPT PEMUTAR APPLE MUSIC
    // ==========================================
    const playlist = [
        {
            title: "Just Keep Watching [slowed+reverb]", 
            artist: "Tate McRae",
            cover: "https://i.ibb.co.com/jZxfLH7X/F1CD.jpg", 
            src: "https://files.catbox.moe/jx3non.mp4",
            description: "Versi lambat (Slowed + Reverb) dari lagu populer Tate McRae yang ada di film F1®. Alunannya memberikan kesan yang lebih mendalam, menenangkan, dan sangat estetik untuk dinikmati sambil bersantai."
        },
        {
            title: "Sesi Potret", 
            artist: "eńau & Ari Lesmana",
            cover: "https://i.ibb.co.com/p6d5bK7j/ab67616d0000b273172768978c7f929803ad7e8b.jpg", 
            src: "https://files.catbox.moe/napsnc.mp4",
            description: "Sebuah kolaborasi apik yang membawa nuansa tenang dan nostalgia. Lagu ini diibaratkan seperti mengabadikan momen-momen berharga dalam hidup bagaikan sebuah jepretan kamera, mengajak pendengarnya untuk meresapi setiap kenangan."
        },
        {
            title: "Berubah", 
            artist: "Tenxi, Jemsii",
            cover: "https://i.ibb.co.com/d4f1hCtR/ab67616d0000b273ebdd8446bacd87dc7796cede.jpg",
            src: "https://www.image2url.com/r2/default/videos/1783809184940-e218acef-eb1f-44e2-8b5b-c55affbd4af0.mp4", 
            description: "Lagu dengan beat yang asik dan lirik relatable tentang seseorang yang memutuskan untuk berubah dan move on dari toxic relationship."
        }
    ];

    let currentSongIndex = 0;
    let isPlaying = false;

    const playerNode = document.getElementById("playerNode");
    const audio = document.getElementById("myAudio");
    const albumCover = document.getElementById("albumCover");
    const songTitleText = document.getElementById("songTitle");
    const artistNameText = document.getElementById("artistName");
    const songDescText = document.getElementById("songDescription");
    
    const progressBar = document.getElementById("progressBar");
    const volumeBar = document.getElementById("volumeBar");
    const currentTimeText = document.getElementById("currentTime");
    const durationTimeText = document.getElementById("durationTime");
    
    const playBtn = document.getElementById("playBtn");
    const playIcon = document.getElementById("playIcon");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function loadSong(index) {
        const song = playlist[index];
        songTitleText.innerText = song.title;
        artistNameText.innerText = song.artist;
        albumCover.src = song.cover;
        audio.src = song.src;
        songDescText.innerText = song.description;
        
        progressBar.value = 0;
        currentTimeText.innerText = "0:00";
        durationTimeText.innerText = "-0:00";
        
        if (isPlaying) {
            audio.play();
        }
    }

    // Muat lagu pertama kali
    loadSong(currentSongIndex);

    function togglePlay() {
        if (audio.paused) {
            audio.play(); 
            playIcon.classList.replace("fa-play", "fa-pause");
            playerNode.classList.add("playing"); // Men-trigger animasi kover membesar
            isPlaying = true;
        } else {
            audio.pause(); 
            playIcon.classList.replace("fa-pause", "fa-play");
            playerNode.classList.remove("playing"); // Men-trigger animasi kover mengecil
            isPlaying = false;
        }
    }

    playBtn.addEventListener("click", togglePlay);

    nextBtn.addEventListener("click", function() {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        loadSong(currentSongIndex);
    });

    prevBtn.addEventListener("click", function() {
        currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
        loadSong(currentSongIndex);
    });

    audio.addEventListener("timeupdate", function() {
        const currentTime = audio.currentTime;
        const duration = audio.duration;
        
        if (duration) {
            progressBar.max = duration;
            progressBar.value = currentTime;
            currentTimeText.innerText = formatTime(currentTime);
            // Format waktu sisa dengan tanda minus persis seperti Apple Music
            const timeLeft = duration - currentTime;
            durationTimeText.innerText = "-" + formatTime(timeLeft);
        }
    });

    progressBar.addEventListener("input", function() {
        audio.currentTime = progressBar.value;
    });

    // Kontrol Volume Tambahan
    volumeBar.addEventListener("input", function() {
        audio.volume = volumeBar.value / 100;
    });

    audio.addEventListener("ended", function() {
        currentSongIndex = (currentSongIndex + 1) % playlist.length;
        loadSong(currentSongIndex);
    });
</script>
</body>
</html>
