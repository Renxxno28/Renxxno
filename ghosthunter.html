<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Mini | Renxxno</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* BACKGROUND LUAR TRANSPARAN */
        html, body {
            background: transparent;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px; 
            color: #2d3436;
        }

        /* === ANIMASI === */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-2px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
        
        /* --- KOTAK UTAMA GRADASI BIRU --- */
        .card-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px 20px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            border: 2px solid #ffffff; 
            text-align: center;
            position: relative;
            overflow: hidden; 
            
            opacity: 0;
            animation: popIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        /* Efek getar card jika terkena bom */
        .card-container.shaking {
            animation: shake 0.4s;
            border-color: #ff4757;
        }

        /* HEADER GAME */
        .header-icon {
            font-size: 38px;
            color: #6c5ce7;
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeUp 0.5s 0.1s forwards;
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeUp 0.5s 0.2s forwards;
        }

        /* TUTORIAL BOX */
        .tutorial-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 10px 12px;
            margin: 0 auto 15px auto;
            font-size: 11px;
            color: #576574;
            text-align: left;
            line-height: 1.5;
            border: 1px dashed rgba(108, 92, 231, 0.4);
            opacity: 0;
            animation: fadeUp 0.5s 0.3s forwards;
        }

        .tutorial-box strong { color: #6c5ce7; font-size: 12px;}
        .t-ghost { color: #6c5ce7; font-weight: bold; }
        .t-bomb { color: #ff4757; font-weight: bold; }
        .t-time { color: #00b894; font-weight: bold; }

        /* STATISTIK GAME */
        .stats-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            opacity: 0;
            animation: fadeUp 0.5s 0.4s forwards;
        }

        .stat-box {
            background: #ffffff;
            padding: 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
            color: #a4b0be;
            width: 48%;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .stat-box span {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            margin-top: 2px;
        }

        #timeLeft.warning { color: #ff4757; }
        #timeLeft.bonus { color: #00b894; }

        /* PAPAN GAME */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; 
            max-width: 290px; 
            margin: 0 auto 20px auto; 
            background: rgba(255, 255, 255, 0.4);
            padding: 12px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            opacity: 0;
            animation: fadeUp 0.5s 0.4s forwards;
        }

        .hole {
            background: rgba(255, 255, 255, 0.8);
            aspect-ratio: 1/1; 
            border-radius: 12px; 
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .hole:active { transform: scale(0.92); }

        /* ENTITAS GAME */
        .entity {
            font-size: 32px;
            opacity: 0;
            transform: translateY(100%); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            pointer-events: none; 
        }

        .hole.active .entity {
            opacity: 1;
            transform: translateY(0); 
        }

        .entity.ghost { color: #6c5ce7; }
        .entity.bomb { color: #ff4757; font-size: 28px; }
        .entity.time { color: #00b894; font-size: 28px; }

        /* Efek Berkedip Saat Dipukul */
        .hole.hit-ghost { border-color: #6c5ce7; background: rgba(108, 92, 231, 0.15); }
        .hole.hit-bomb { border-color: #ff4757; background: rgba(255, 71, 87, 0.2); }
        .hole.hit-time { border-color: #00b894; background: rgba(0, 184, 148, 0.2); }

        /* TOMBOL MULAI */
        .start-btn {
            width: 100%;
            background: linear-gradient(135deg, #6c5ce7, #5b4bc4);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            opacity: 0;
            animation: fadeUp 0.5s 0.5s forwards;
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        /* State Disable saat Bermain (Abu-abu) */
        .start-btn:disabled {
            background: #b2bec3;
            color: #ffffff;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* --- OVERLAY MENU GAME OVER --- */
        .game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 39, 46, 0.95);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 20px;
        }

        .game-over-screen.show {
            opacity: 1;
            pointer-events: all;
        }

        .go-title {
            font-size: 28px;
            font-weight: 900;
            color: #ff4757;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .go-score {
            font-size: 15px;
            color: #ffffff;
            margin-bottom: 25px;
        }
        .go-score span {
            color: #00d2ff;
            font-size: 24px;
            font-weight: 800;
            display: block;
            margin-top: 5px;
        }

        /* BUNGKUSAN 2 TOMBOL DI GAME OVER */
        .go-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .go-btn {
            background: #ffffff;
            color: #1e272e;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
            transition: transform 0.2s, background 0.2s;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .go-btn:hover { transform: scale(1.05); }

        /* Tombol Berhenti (Garis Putih/Transparan) */
        .go-btn.quit-btn {
            background: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            box-shadow: none;
            padding: 8px 18px; /* Disesuaikan karena ada ketebalan border */
        }

        .go-btn.quit-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

    </style>
</head>
<body>

<div class="card-container" id="gameCard">
        
    <div class="header-icon"><i class="fa-solid fa-gamepad"></i></div>
    <h1 class="header-title">Ghost Hunter</h1>
    
    <div class="tutorial-box">
        <strong>Cara Bermain:</strong><br>
        <span class="t-ghost"><i class="fa-solid fa-ghost"></i> Ghost:</span> +1 Skor.<br>
        <span class="t-bomb"><i class="fa-solid fa-bomb"></i> Bom:</span> Game Over.<br>
        <span class="t-time"><i class="fa-solid fa-stopwatch"></i> Time:</span> +3 Detik.
    </div>

    <div class="stats-container">
        <div class="stat-box">
            Waktu
            <span id="timeLeft">30</span>
        </div>
        <div class="stat-box">
            Skor
            <span id="score">0</span>
        </div>
    </div>

    <div class="game-board">
        <div class="hole" data-index="0"></div>
        <div class="hole" data-index="1"></div>
        <div class="hole" data-index="2"></div>
        <div class="hole" data-index="3"></div>
        <div class="hole" data-index="4"></div>
        <div class="hole" data-index="5"></div>
        <div class="hole" data-index="6"></div>
        <div class="hole" data-index="7"></div>
        <div class="hole" data-index="8"></div>
    </div>

    <button class="start-btn" id="startBtn"><i class="fa-solid fa-play"></i> Mulai Game</button>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="go-title" id="goTitle">GAME OVER!</div>
        <div class="go-score" id="goReason">Waktu Habis!</div>
        <div class="go-score">Skor Akhir: <span id="finalScore">0</span></div>
        
        <div class="go-buttons">
            <button class="go-btn" id="restartBtn"><i class="fa-solid fa-rotate-right"></i> Main Lagi</button>
            <button class="go-btn quit-btn" id="quitBtn"><i class="fa-solid fa-xmark"></i> Berhenti</button>
        </div>
    </div>

</div>

<script>
    const holes = document.querySelectorAll('.hole');
    const timeLeftText = document.querySelector('#timeLeft');
    const scoreText = document.querySelector('#score');
    const startBtn = document.querySelector('#startBtn');
    
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScore');
    const goTitle = document.getElementById('goTitle');
    const goReason = document.getElementById('goReason');
    const restartBtn = document.getElementById('restartBtn');
    const quitBtn = document.getElementById('quitBtn');
    const gameCard = document.getElementById('gameCard');

    let score = 0;
    let currentTime = 30;
    let gameInterval = null;
    let countdownInterval = null;
    let gameSpeed = 850; 
    let isPlaying = false;

    const ghostIcon = '<i class="fa-solid fa-ghost entity ghost"></i>';
    const bombIcon = '<i class="fa-solid fa-bomb entity bomb"></i>';
    const timeIcon = '<i class="fa-solid fa-stopwatch entity time"></i>';

    function spawnEntities() {
        holes.forEach(hole => {
            hole.classList.remove('active', 'hit-ghost', 'hit-bomb', 'hit-time');
            hole.innerHTML = '';
            hole.dataset.type = '';
        });

        let ghostCount = Math.random() > 0.65 ? 2 : 1; 
        let spawnBomb = Math.random() > 0.7; 
        let spawnTime = Math.random() > 0.91; 

        let availableHoles = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        availableHoles.sort(() => Math.random() - 0.5);

        for (let i = 0; i < ghostCount; i++) {
            if(availableHoles.length === 0) break;
            let holeIndex = availableHoles.pop();
            holes[holeIndex].innerHTML = ghostIcon;
            holes[holeIndex].dataset.type = 'ghost';
            holes[holeIndex].classList.add('active');
        }

        if (spawnBomb && availableHoles.length > 0) {
            let holeIndex = availableHoles.pop();
            holes[holeIndex].innerHTML = bombIcon;
            holes[holeIndex].dataset.type = 'bomb';
            holes[holeIndex].classList.add('active');
        }

        if (spawnTime && availableHoles.length > 0) {
            let holeIndex = availableHoles.pop();
            holes[holeIndex].innerHTML = timeIcon;
            holes[holeIndex].dataset.type = 'time';
            holes[holeIndex].classList.add('active');
        }
    }

    // Eksekusi Pukulan Target
    holes.forEach(hole => {
        const handleHit = (e) => {
            if(e.type === 'touchstart') e.preventDefault(); 
            
            if (!isPlaying || !hole.classList.contains('active')) return;

            let type = hole.dataset.type;

            if (type === 'ghost') {
                score++;
                scoreText.textContent = score;
                hole.classList.remove('active');
                hole.innerHTML = ''; 
                hole.classList.add('hit-ghost');
                
            } else if (type === 'bomb') {
                hole.classList.remove('active');
                hole.classList.add('hit-bomb');
                gameCard.classList.add('shaking'); 
                setTimeout(() => gameCard.classList.remove('shaking'), 400);
                triggerGameOver(true);

            } else if (type === 'time') {
                currentTime += 3;
                timeLeftText.textContent = currentTime;
                timeLeftText.classList.add('bonus');
                setTimeout(() => timeLeftText.classList.remove('bonus'), 500);
                
                hole.classList.remove('active');
                hole.innerHTML = '';
                hole.classList.add('hit-time');
            }
        };

        hole.addEventListener('mousedown', handleHit);
        hole.addEventListener('touchstart', handleHit);
    });

    function countDown() {
        currentTime--;
        timeLeftText.textContent = currentTime;

        if (currentTime <= 5) {
            timeLeftText.classList.add('warning');
        } else {
            timeLeftText.classList.remove('warning');
        }

        if (currentTime <= 0) {
            triggerGameOver(false); 
        }
    }

    // Fungsi Trigger Game Over
    function triggerGameOver(isBombed) {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(countdownInterval);
        
        // Kembalikan tombol seperti semula dan aktifkan lagi
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Mulai Game';

        finalScoreText.innerText = score;
        
        if (isBombed) {
            goTitle.innerText = "KABOOM!";
            goReason.innerText = "Kamu Terkena Bom!";
            goTitle.style.color = "#ff4757";
        } else {
            goTitle.innerText = "WAKTU HABIS!";
            goReason.innerText = "Permainan Selesai!";
            goTitle.style.color = "#6c5ce7";
        }
        
        setTimeout(() => {
            gameOverScreen.classList.add('show');
        }, 200);
    }

    // Fungsi Mulai Bermain (Hanya bisa diklik jika sedang tidak main)
    function startGame() {
        score = 0;
        currentTime = 30;
        isPlaying = true;
        
        scoreText.textContent = score;
        timeLeftText.textContent = currentTime;
        timeLeftText.classList.remove('warning');
        gameOverScreen.classList.remove('show');
        
        // Matikan tombol agar tidak bisa di-spam
        startBtn.disabled = true;
        startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Bermain...';
        
        holes.forEach(h => { h.innerHTML = ''; h.classList.remove('active', 'hit-ghost', 'hit-bomb', 'hit-time'); });

        clearInterval(gameInterval);
        clearInterval(countdownInterval);
        
        gameInterval = setInterval(spawnEntities, gameSpeed);
        countdownInterval = setInterval(countDown, 1000);
    }

    startBtn.addEventListener('click', startGame);
    
    // Tombol Main Lagi di layar Game Over
    restartBtn.addEventListener('click', () => {
        gameOverScreen.classList.remove('show');
        setTimeout(startGame, 300); // Beri jeda layar tertutup dulu baru mulai
    });

    // Tombol Berhenti (Quit) di layar Game Over
    quitBtn.addEventListener('click', () => {
        gameOverScreen.classList.remove('show');
        // Kosongkan papan dan kembalikan angka ke awal
        holes.forEach(h => { h.innerHTML = ''; h.classList.remove('active', 'hit-ghost', 'hit-bomb', 'hit-time'); });
        scoreText.textContent = "0";
        timeLeftText.textContent = "30";
    });

</script>
</body>
</html>
