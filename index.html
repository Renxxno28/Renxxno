<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff; /* Latar belakang putih bersih ala Apple */
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding: 100px 20px 40px 20px; 
            color: #1d1d1f;
        }

        /* =========================================
           TOP NAVBAR APPLE STYLE
           ========================================= */
        .apple-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 54px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 9999; border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .nav-brand { font-size: 20px; font-weight: 600; color: #1d1d1f; text-decoration: none; letter-spacing: -0.5px; }
        .nav-icons { display: flex; gap: 25px; color: #1d1d1f; font-size: 18px; }
        .nav-icons i { cursor: pointer; transition: opacity 0.2s; }
        .nav-icons i:hover { opacity: 0.5; }

        .nav-overlay {
            position: fixed; top: 54px; left: 0; width: 100%; height: calc(100vh - 54px);
            background: #ffffff; z-index: 9998; padding: 30px 25px;
            transform: translateY(-100%); opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .nav-overlay.active { transform: translateY(0); opacity: 1; visibility: visible; }

        .menu-list { list-style: none; }
        .menu-list li { border-bottom: 1px solid #e5e5ea; }
        .menu-list a { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; font-size: 24px; font-weight: 600; color: #1d1d1f; text-decoration: none; transition: color 0.3s; 
        }
        .menu-list a:hover, .menu-list a.active { color: #0066cc; }
        .menu-list a i { font-size: 18px; color: #86868b; }

        .submenu-header {
            display: flex; align-items: center; font-size: 24px; font-weight: 600; color: #1d1d1f;
            padding-bottom: 15px; margin-bottom: 10px; border-bottom: 1px solid #e5e5ea; cursor: pointer;
        }
        .submenu-header i { margin-right: 15px; color: #0066cc; font-size: 22px; }

        .search-box { display: flex; align-items: center; background: #f5f5f7; border-radius: 12px; padding: 12px 15px; }
        .search-box i { color: #86868b; font-size: 20px; margin-right: 12px; }
        .search-box input { border: none; background: transparent; outline: none; font-size: 20px; width: 100%; color: #1d1d1f; }
        .search-box input::placeholder { color: #86868b; }

        /* =========================================
           KOTAK KONTEN BERANDA
           ========================================= */
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(30px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .card-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease;
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        .card-container:hover { transform: translateY(-5px); }
        
        .img-wrapper { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s forwards; }

        .profile-img {
            width: 160px;          
            height: auto;          
            border-radius: 20px;   
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }

        .profile-name { font-size: 22px; font-weight: 700; margin: 10px 0 5px 0; color: #1e272e; opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s forwards; }
        .profile-bio { font-size: 14px; color: #576574; margin-bottom: 30px; line-height: 1.6; font-weight: 400; opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.4s forwards; }

        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .btn-link {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 15px 20px; border-radius: 16px; text-decoration: none;
            font-weight: 600; font-size: 15px; opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-link i { font-size: 20px; }

        .btn-link:nth-child(1) { animation-delay: 0.5s; }
        .btn-link:nth-child(2) { animation-delay: 0.6s; }
        .btn-link:nth-child(3) { animation-delay: 0.7s; }
        .btn-link:nth-child(4) { animation-delay: 0.8s; }
        
        .youtube-btn { background: #ff0000; color: #ffffff; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2); }
        .youtube-btn:hover { background: #cc0000; transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(255, 0, 0, 0.35); }

        .instagram-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #ffffff; box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2); }
        .instagram-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(220, 39, 67, 0.35); }

        .email-btn { background: #4285f4; color: #ffffff; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.2); }
        .email-btn:hover { background: #357ae8; transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(66, 133, 244, 0.35); }

        .whatsapp-btn { background: #25D366; color: #ffffff; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .whatsapp-btn:hover { background: #20bd5a; transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.35); }
    </style>
</head>
<body>

        <ul class="menu-list">

<!-- JAVASCRIPT LENGKAP UNTUK MENGATUR NAVIGASI & SUB-MENU -->
<script>
    const btnMenu = document.getElementById('toggleMenu');
    const btnSearch = document.getElementById('toggleSearch');
    const menuOverlay = document.getElementById('menuOverlay');
    const searchOverlay = document.getElementById('searchOverlay');
    
    // Inilah variabel yang sebelumnya tertinggal di index.html!
    const mainMenu = document.getElementById('mainMenu');
    const subMenuGames = document.getElementById('subMenuGames');
    const btnGamesMenu = document.getElementById('btnGamesMenu');
    const btnBackMainMenu = document.getElementById('btnBackMainMenu');

    // Buka/Tutup Menu
    btnMenu.addEventListener('click', () => {
        if (searchOverlay.classList.contains('active')) {
            searchOverlay.classList.remove('active');
            btnSearch.classList.replace('fa-xmark', 'fa-magnifying-glass');
        }
        menuOverlay.classList.toggle('active');
        if (menuOverlay.classList.contains('active')) {
            btnMenu.classList.replace('fa-bars', 'fa-xmark');
            // Pastikan kembali ke Menu Utama setiap kali Hamburger Menu ditekan
            mainMenu.style.display = 'block';
            subMenuGames.style.display = 'none';
        } else {
            btnMenu.classList.replace('fa-xmark', 'fa-bars');
        }
    });

    // Buka/Tutup Pencarian
    btnSearch.addEventListener('click', () => {
        if (menuOverlay.classList.contains('active')) {
            menuOverlay.classList.remove('active');
            btnMenu.classList.replace('fa-xmark', 'fa-bars');
        }
        searchOverlay.classList.toggle('active');
        if (searchOverlay.classList.contains('active')) {
            btnSearch.classList.replace('fa-magnifying-glass', 'fa-xmark');
            document.getElementById('searchInput').focus();
        } else {
            btnSearch.classList.replace('fa-xmark', 'fa-magnifying-glass');
        }
    });

    // INI ADALAH FUNGSI YANG MEMPERBAIKI BUG "KLIK GAMES"
    btnGamesMenu.addEventListener('click', (e) => {
        e.preventDefault(); // Mencegah layar lompat ke atas
        mainMenu.style.display = 'none'; // Sembunyikan menu utama
        subMenuGames.style.display = 'block'; // Tampilkan submenu Games
    });

    // Kembali ke Menu Utama dari Sub-Menu Games
    btnBackMainMenu.addEventListener('click', () => {
        subMenuGames.style.display = 'none';
        mainMenu.style.display = 'block';
    });
</script>
