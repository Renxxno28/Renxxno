<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Bloxx - Renxxno Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent: #0071e3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; touch-action: pan-y; }
        
        /* Navbar Glassmorphism */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000;
        }
        
        /* Logo Anti-Popup */
        .logo {
            font-size: 1.2rem; font-weight: 700; color: var(--text-main); text-decoration: none;
            -webkit-touch-callout: none; user-select: none;
        }
        
        /* Hamburger Menu */
        .hamburger {
            cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 1001;
        }
        .hamburger span {
            display: block; width: 25px; height: 3px; background-color: var(--text-main);
            transition: all 0.3s ease; border-radius: 3px;
        }
        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
                /* Full-Screen Menu Overlay */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg-color); z-index: 999;
            display: flex; flex-direction: column; padding: 80px 20px 20px;
            transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }
        .menu-overlay.active { transform: translateY(0); }
        .menu-link {
            font-size: 1.5rem; font-weight: 600; color: var(--text-main);
            text-decoration: none; margin: 15px 0; border-bottom: 1px solid #ddd; padding-bottom: 10px;
        }
        
        /* Search, Tooltip, Game Canvas */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-input {
            width: 100%; padding: 12px 40px; border-radius: 20px;
            border: 1px solid #ccc; font-size: 1rem; outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 15px; color: #888; }
        .search-results { display: none; background: white; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-results a { display: block; padding: 10px 15px; color: var(--text-main); text-decoration: none; border-bottom: 1px solid #eee; }
        .tooltip {
            position: fixed; top: 70px; right: 20px; background: var(--text-main); color: white;
            padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; z-index: 998;
            opacity: 0; transform: translateY(-10px); transition: 0.5s ease;
        }
        .tooltip.show { opacity: 1; transform: translateY(0); }
        
        /* Game UI */
        #game-container { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #87CEEB; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .ui-layer { position: absolute; top: 80px; left: 0; width: 100%; pointer-events: none; text-align: center; z-index: 10; }
        #score-display { font-size: 2rem; font-weight: 700; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #start-btn {
            pointer-events: auto; padding: 12px 30px; font-size: 1.2rem; font-weight: 600;
            background: var(--accent); color: white; border: none; border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.4); cursor: pointer; margin-top: 20px;
        }
        .anti-download { -webkit-touch-callout: none; user-select: none; pointer-events: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo" draggable="false" oncontextmenu="return false;">Renxxno</a>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>
        <div class="menu-overlay" id="menu-overlay">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="search-input" placeholder="Cari halaman atau game...">
            <div class="search-results" id="search-results"></div>
        </div>
        <a href="index.html" class="menu-link"><i class="fas fa-home"></i> Beranda</a>
        <a href="biodata.html" class="menu-link"><i class="fas fa-user"></i> Biodata</a>
        <a href="games.html" class="menu-link"><i class="fas fa-gamepad"></i> Akun Games</a>
        <div class="menu-link" style="border:none; padding-bottom:0; color:#888; font-size:1rem;">Mini Games:</div>
        <a href="ghosthunter.html" class="menu-link" style="padding-left:20px;">- Ghost Hunter</a>
        <a href="aeroglide.html" class="menu-link" style="padding-left:20px;">- Aero Glide</a>
        <a href="puzzle.html" class="menu-link" style="padding-left:20px;">- Block Puzzle</a>
        <a href="towerbloxx.html" class="menu-link" style="padding-left:20px;">- Tower Bloxx</a>
        <a href="music.html" class="menu-link"><i class="fas fa-music"></i> Music Player</a>
        <a href="store.html" class="menu-link"><i class="fas fa-store"></i> Store</a>
        <a href="Memberipesan.html" class="menu-link"><i class="fas fa-envelope"></i> Pesan</a>
        <a href="rating.html" class="menu-link"><i class="fas fa-star"></i> Rating</a>
        <a href="donate.html" class="menu-link"><i class="fas fa-qrcode"></i> Donasi</a>
        <a href="sosmed.html" class="menu-link"><i class="fas fa-hashtag"></i> Sosial Media</a>
    </div>
    <div class="tooltip" id="tooltip">Klik di sini untuk menu lainnya</div>

    <div id="game-container">
        <div class="ui-layer">
            <div id="score-display">0</div>
            <button id="start-btn">Mulai Bangun!</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // Global UI Features
        const hamburger = document.getElementById('hamburger');
        const menuOverlay = document.getElementById('menu-overlay');
        const tooltip = document.getElementById('tooltip');
        
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            tooltip.classList.remove('show');
        });

        if(!sessionStorage.getItem('tooltipShown')) {
            setTimeout(() => { tooltip.classList.add('show'); }, 1500);
            setTimeout(() => { tooltip.classList.remove('show'); }, 5000);
            sessionStorage.setItem('tooltipShown', 'true');
        }
                // Search Engine
        const pages = [
            { name: "Beranda", url: "index.html" }, { name: "Biodata", url: "biodata.html" },
            { name: "Akun Games", url: "games.html" }, { name: "Ghost Hunter", url: "ghosthunter.html" },
            { name: "Aero Glide", url: "aeroglide.html" }, { name: "Block Puzzle", url: "puzzle.html" },
            { name: "Tower Bloxx", url: "towerbloxx.html" }, { name: "Music Player", url: "music.html" },
            { name: "Store", url: "store.html" }, { name: "Pesan", url: "Memberipesan.html" },
            { name: "Rating", url: "rating.html" }, { name: "Donasi", url: "donate.html" },
            { name: "Sosial Media", url: "sosmed.html" }
        ];
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            searchResults.innerHTML = '';
            if(query.length > 0) {
                searchResults.style.display = 'block';
                const filtered = pages.filter(p => p.name.toLowerCase().includes(query));
                filtered.forEach(p => {
                    const a = document.createElement('a'); a.href = p.url; a.textContent = p.name;
                    searchResults.appendChild(a);
                });
                if(filtered.length === 0) { searchResults.innerHTML = '<div style="padding:10px;">Tidak ditemukan</div>'; }
            } else { searchResults.style.display = 'none'; }
        });

        // Audio Generator (Tanpa file mp3 eksternal)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'drop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'perfect') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'over') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // Game Logic
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const scoreUI = document.getElementById('score-display');
        
        let width, height;
        let blocks = [], currentBlock = null, cameraY = 0, score = 0, state = 'start';
        let time = 0, sway = 0;
        const blockW = 120, blockH = 80;
                function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize); resize();

        function drawTexturedBlock(x, y, w, h, isBase) {
            ctx.save(); ctx.translate(x, y);
            // Warna dasar gedung
            ctx.fillStyle = isBase ? '#555' : '#e6a822';
            ctx.fillRect(-w/2, 0, w, h);
            // Border outline
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(-w/2, 0, w, h);
            // Menggambar jendela (Tekstur)
            ctx.fillStyle = '#fff';
            let cols = 4, rows = 3, pX = w/cols, pY = h/rows;
            for(let i=0; i<cols; i++) {
                for(let j=0; j<rows; j++) {
                    if(!isBase && Math.random() > 0.3) { // Jendela menyala acak
                        ctx.fillStyle = (i+j)%2==0 ? '#a3d9ff' : '#fcfc83';
                        ctx.fillRect(-w/2 + i*pX + 5, j*pY + 5, pX - 10, pY - 10);
                    }
                }
            }
            // Atap (garis pemisah)
            ctx.fillStyle = '#333'; ctx.fillRect(-w/2 - 5, 0, w + 10, 8);
            ctx.restore();
        }

        function initGame() {
            blocks = [{x: width/2, y: height - blockH - 20, w: blockW, h: blockH, base: true}];
            cameraY = 0; score = 0; scoreUI.innerText = score; sway = 0;
            state = 'playing'; startBtn.style.display = 'none'; spawnBlock();
        }

        function spawnBlock() {
            currentBlock = { x: width/2, y: cameraY + 100, w: blockW, h: blockH, falling: false, dy: 0 };
        }

        function update() {
            time += 0.04;
            if(state === 'playing') {
                if(!currentBlock.falling) {
                    currentBlock.x = width/2 + Math.sin(time) * (width/3);
                    currentBlock.y = cameraY + 150;
                } else {
                    currentBlock.y += currentBlock.dy; currentBlock.dy += 0.8; // Gravity
                    let topBlock = blocks[blocks.length-1];
                    if(currentBlock.y + blockH >= topBlock.y) {
                        let diff = Math.abs(currentBlock.x - topBlock.x);
                        if(diff < blockW) { // Berhasil mendarat
                            currentBlock.y = topBlock.y - blockH;
                            blocks.push({...currentBlock, base: false});
                            score++; scoreUI.innerText = score;
                            if(diff < 10) { currentBlock.x = topBlock.x; playSfx('perfect'); } else { playSfx('hit'); }
                            sway += diff * 0.05; // Efek goyang
                            spawnBlock();
                        } else { // Jatuh
                            state = 'gameover'; playSfx('over');
                            startBtn.innerText = "Coba Lagi"; startBtn.style.display = 'inline-block';
                        }
                    }
                }
                let targetCam = height - (blocks.length * blockH) - 300;
                if(targetCam < cameraY) cameraY -= (cameraY - targetCam) * 0.1;
                sway *= 0.95; // Redam goyangan perlahan
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.save();
            ctx.translate(0, -cameraY + (height - 300));
            // Gambar Menara
            blocks.forEach((b, i) => {
                let s = (blocks.length - i) * Math.sin(time) * sway;
                drawTexturedBlock(b.x + s, b.y, b.w, b.h, b.base);
            });
            // Gambar Tali & Blok Menggantung
            if(currentBlock && state === 'playing') {
                if(!currentBlock.falling) {
                    ctx.beginPath(); ctx.moveTo(width/2, cameraY - 100); ctx.lineTo(currentBlock.x, currentBlock.y);
                    ctx.strokeStyle = '#333'; ctx.lineWidth = 3; ctx.stroke();
                }
                drawTexturedBlock(currentBlock.x, currentBlock.y, currentBlock.w, currentBlock.h, false);
            }
            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        window.addEventListener('mousedown', () => {
            if(state === 'playing' && currentBlock && !currentBlock.falling) {
                currentBlock.falling = true; playSfx('drop');
            }
        });
        window.addEventListener('touchstart', (e) => {
            if(e.target !== hamburger && state === 'playing' && currentBlock && !currentBlock.falling) {
                currentBlock.falling = true; playSfx('drop');
            }
        });

        startBtn.addEventListener('click', initGame);
        loop();
    </script>
</body>
</html>
