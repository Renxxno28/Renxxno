<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View & Rating | Renxxno</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* BACKGROUND LUAR TRANSPARAN TOTAL */
        html {
            min-height: 100vh;
            background: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: transparent; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 60px; 
            padding: 30px 10px 50px 10px; 
            min-height: 100vh;
        }

        /* === KUMPULAN ANIMASI MASUK === */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* WARNA GRADASI BIRU MASUK KE DALAM KOTAK */
        .premium-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px 25px; 
            width: 100%;
            max-width: 350px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
            border: 2px solid #ffffff; 
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;

            /* Pemicu Animasi Masuk */
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        /* Delay berurutan untuk kotak 1 dan 2 */
        .premium-card:nth-child(1) { animation-delay: 0s; }
        .premium-card:nth-child(2) { animation-delay: 0.2s; }

        .premium-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.08) 0%, transparent 60%);
            z-index: -1;
            animation: rotateGlow 10s linear infinite;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* IKON MELAYANG (VIEWS) */
        .icon-wrapper {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #6c5ce7, #0984e3);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            
            /* Gabungan animasi masuk dan melayang */
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.2s forwards, float 3s ease-in-out infinite 0.8s;
        }

        .icon-wrapper i { font-size: 24px; color: #ffffff; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .stat-title {
            font-size: 16px;
            font-weight: 800;
            color: #2d3436;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s forwards;
        }

        .badge-wrapper {
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.4s forwards;
        }

        .badge-img {
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            height: 30px; 
            margin-bottom: 5px;
        }
        .badge-img:hover { transform: scale(1.05); }

        .divider {
            border: 0;
            border-top: 2px dashed rgba(0, 0, 0, 0.1);
            margin: 20px 0;
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.6s forwards;
        }

        /* FITUR RATA-RATA RATING */
        .avg-rating-container { 
            margin-bottom: 20px; 
            transition: all 0.5s ease; 
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.5s forwards;
        }
        
        .avg-label {
            font-size: 11px;
            color: #a4b0be;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .avg-number { 
            font-size: 46px; 
            font-weight: 800; 
            color: #2d3436; 
            line-height: 1; 
            margin-bottom: 5px; 
        }
        
        .avg-stars { 
            color: #fdcb6e; 
            font-size: 18px; 
        }

        /* FITUR INPUT RATING BINTANG */
        #ratingArea {
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.7s forwards;
        }

        .rating-title { font-size: 14px; font-weight: 700; color: #2d3436; margin-bottom: 12px; }
        
        .star-rating { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .star-rating i { font-size: 28px; color: #b2bec3; cursor: pointer; transition: all 0.2s ease; }
        .star-rating i:hover { transform: scale(1.2); }

        /* FITUR KOMENTAR */
        .comment-section { display: none; animation: popIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }

        .comment-box {
            width: 100%; height: 80px; padding: 12px; border-radius: 12px;
            border: 1px solid rgba(108, 92, 231, 0.3); background: rgba(255, 255, 255, 0.7);
            font-family: 'Poppins', sans-serif; font-size: 13px; color: #2d3436;
            outline: none; resize: none; margin-bottom: 12px; transition: border 0.3s ease;
        }
        .comment-box:focus { border-color: #6c5ce7; background: #ffffff; }

        .submit-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #ffffff; border: none;
            padding: 10px 0; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3); transition: all 0.3s ease;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        
        .submit-btn:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4); 
        }

        .submit-btn:disabled {
            background: #a29bfe;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* PESAN TERIMA KASIH */
        .thank-you-msg { 
            display: none; 
            font-size: 14px; 
            font-weight: 600; 
            color: #00b894; 
            animation: popIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; 
            margin-top: 10px; 
            padding: 20px 0;
        }
        .thank-you-msg i { font-size: 35px; margin-bottom: 10px; display: block; animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>

<!-- KOTAK 1: VIEW -->
<div class="premium-card">
    <div class="icon-wrapper">
        <i class="fa-solid fa-eye"></i>
    </div>
    <div class="stat-title">Dilihat Oleh</div>
    <div class="badge-wrapper">
        <img class="badge-img" src="https://api.visitorbadge.io/api/visitors?path=renxxno.portofolio.v2026&label=TOTAL%20VIEWS&labelColor=%232d3436&countColor=%236c5ce7&style=for-the-badge" alt="Visitor Badge">
    </div>
</div>

<!-- KOTAK 2: RATING -->
<div class="premium-card">
    
    <div class="avg-rating-container" id="avgContainer">
        <div class="avg-label">Rata-rata Penilaian</div>
        <div class="avg-number" id="avgNumberText">3.9</div>
        <div class="avg-stars">
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star-half-stroke"></i>
            <i class="fa-regular fa-star"></i>
        </div>
    </div>

    <hr class="divider">

    <!-- FORMULIR RATING -->
    <form id="ratingForm" action="https://formspree.io/f/xgojgjgq" method="POST">
        <div id="ratingArea">
            <div class="rating-title">Beri Rating Website Ini</div>
            
            <div class="star-rating" id="stars">
                <i class="fa-regular fa-star" data-val="1"></i>
                <i class="fa-regular fa-star" data-val="2"></i>
                <i class="fa-regular fa-star" data-val="3"></i>
                <i class="fa-regular fa-star" data-val="4"></i>
                <i class="fa-regular fa-star" data-val="5"></i>
            </div>
            
            <input type="hidden" name="Bintang" id="ratingValue" required>

            <div class="comment-section" id="commentSection">
                <textarea name="Komentar" class="comment-box" placeholder="Tulis komentar dan kesanmu di sini..." required></textarea>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fa-solid fa-paper-plane" id="btnIcon"></i> <span id="btnText">Kirim Penilaian</span>
                </button>
            </div>
        </div>
    </form>

    <!-- PESAN SUKSES SETELAH KIRIM -->
    <div class="thank-you-msg" id="thankYouMsg">
        <i class="fa-solid fa-face-smile-beam"></i>
        Terima kasih! Penilaian kamu sudah berhasil terkirim.
    </div>

</div>

<script>
    const stars = document.querySelectorAll('#stars i');
    const commentSection = document.getElementById('commentSection');
    const ratingValueInput = document.getElementById('ratingValue');
    const ratingForm = document.getElementById('ratingForm');
    const ratingArea = document.getElementById('ratingArea');
    const thankYouMsg = document.getElementById('thankYouMsg');
    
    const submitBtn = document.getElementById('submitBtn');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    
    // Variabel untuk animasi nilai ulasan
    let currentRating = 0;
    let baseAvg = 3.9;
    const avgNumberText = document.getElementById('avgNumberText');

    stars.forEach(star => {
        star.addEventListener('mouseover', function() {
            let val = this.getAttribute('data-val');
            highlightStars(val);
        });
        star.addEventListener('mouseout', function() {
            highlightStars(currentRating);
        });
        star.addEventListener('click', function() {
            currentRating = this.getAttribute('data-val');
            highlightStars(currentRating);
            ratingValueInput.value = currentRating + " Bintang"; 
            commentSection.style.display = 'block'; 
        });
    });

    function highlightStars(val) {
        stars.forEach(star => {
            if(star.getAttribute('data-val') <= val) {
                star.classList.remove('fa-regular');
                star.classList.add('fa-solid');
                star.style.color = '#fdcb6e'; 
            } else {
                star.classList.remove('fa-solid');
                star.classList.add('fa-regular');
                star.style.color = '#b2bec3'; 
            }
        });
    }

    // Mengirim Form ke Formspree dengan efek loading
    ratingForm.addEventListener("submit", async function(event) {
        event.preventDefault(); 
        
        // Ubah tombol jadi status "Loading"
        submitBtn.disabled = true;
        btnIcon.className = "fa-solid fa-spinner fa-spin";
        btnText.innerText = "Mengirim...";
        
        let userRating = parseInt(currentRating);
        let newAvg = ((baseAvg * 5) + userRating) / 6; 
        avgNumberText.innerText = newAvg.toFixed(1);
        
        var data = new FormData(event.target);
        
        fetch(event.target.action, {
            method: ratingForm.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                // Sukses: Tutup rating area, buka notifikasi sukses
                ratingArea.style.display = 'none'; 
                thankYouMsg.style.display = 'block'; 
            } else {
                alert("Maaf, terjadi kesalahan pada server saat mengirim.");
            }
        }).catch(error => {
            alert("Maaf, gagal mengirim penilaian. Periksa koneksi internet Anda.");
        }).finally(() => {
            // Kembalikan tombol ke mode normal (walau sukses/gagal)
            submitBtn.disabled = false;
            btnIcon.className = "fa-solid fa-paper-plane";
            btnText.innerText = "Kirim Penilaian";
        });
    });
</script>

</body>
</html>
